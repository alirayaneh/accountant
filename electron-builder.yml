appId: com.easystock.accountant
productName: EasyStock Accountant
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
asar: true
asarIntegrity: true
compression: maximum
directories:
  output: release
extraMetadata:
  main: electron-dist/main.cjs
files:
  - electron-dist/main.cjs
  - package.json
extraResources:
  - from: .next/standalone
    to: next
    filter:
      - "**/*"
      - "!node_modules/**"
  - from: .next/standalone/node_modules
    to: next/node_modules
    filter:
      - "**/*"
  - from: .next/static
    to: next/.next/static
    filter:
      - "**/*"
  - from: public
    to: next/public
    filter:
      - "**/*"
  - from: backend/dist
    to: backend/dist
    filter:
      - "**/*"
  - from: backend/node_modules
    to: backend/node_modules
    filter:
      - "**/*"
  - from: backend/package.json
    to: backend/package.json
linux:
  target:
    - AppImage
  category: Office
win:
  target:
    - target: portable
      arch:
        - x64
