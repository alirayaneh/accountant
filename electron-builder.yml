appId: com.easystock.accountant
productName: EasyStock Accountant
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
icon: build/icon.png
asar: true
compression: normal
# Artifacts are uploaded via GitHub Actions (upload-artifact / softprops/action-gh-release).
publish: null
directories:
  output: release
extraMetadata:
  main: electron-dist/main.cjs
files:
  - electron-dist/main.cjs
  - electron-dist/offline-storage.cjs
  - electron-dist/preload.cjs
  - package.json
extraResources:
  - from: out
    to: static
    filter:
      - "**/*"
  - from: backend/dist
    to: backend/dist
    filter:
      - "**/*"
  - from: backend/node_modules
    to: backend/node_modules
    filter:
      - "**/*"
  - from: backend/package.json
    to: backend/package.json
linux:
  icon: build/icon.png
  target:
    - AppImage
  category: Office
win:
  icon: build/icon.png
  target:
    - target: portable
      arch:
        - x64
